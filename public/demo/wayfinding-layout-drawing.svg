  </g>
  <g opacity="0.9">
    <polygon points="310,260 300,275 320,275" fill="#22c55e"/>
    <text x="310" y="255" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="8" font-weight="700">S2</text>
  </g>
  <g opacity="0.9">
    <polygon points="460,260 450,275 470,275" fill="#22c55e"/>
    <text x="460" y="255" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="8" font-weight="700">S3</text>
  </g>
  <g opacity="0.9">
