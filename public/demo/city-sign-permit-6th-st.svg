<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Document page -->
  <rect x="220" y="60" width="360" height="480" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <!-- Header bar -->
  <rect x="220" y="60" width="360" height="50" rx="4" fill="#0f172a"/>
  <rect x="220" y="106" width="360" height="4" fill="#0f172a"/>
  <text x="400" y="92" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="16" font-weight="700">CITY OF AUSTIN</text>
  <!-- Seal circle -->
  <circle cx="400" cy="160" r="35" fill="none" stroke="#334155" stroke-width="1.5"/>
  <text x="400" y="155" text-anchor="middle" fill="#334155" font-family="system-ui, sans-serif" font-size="9" font-weight="600">CITY</text>
  <text x="400" y="170" text-anchor="middle" fill="#334155" font-family="system-ui, sans-serif" font-size="9" font-weight="600">SEAL</text>
  <!-- Title -->
  <text x="400" y="225" text-anchor="middle" fill="#0f172a" font-family="system-ui, sans-serif" font-size="18" font-weight="700">SIGN PERMIT</text>
  <!-- Divider -->
  <line x1="260" y1="240" x2="540" y2="240" stroke="#cbd5e1" stroke-width="1"/>
  <!-- Form fields -->
  <text x="260" y="268" fill="#475569" font-family="system-ui, sans-serif" font-size="11" font-weight="600">PERMIT NO:</text>
  <text x="360" y="268" fill="#0f172a" font-family="system-ui, sans-serif" font-size="11">SP-2026-05137</text>
  <text x="260" y="293" fill="#475569" font-family="system-ui, sans-serif" font-size="11" font-weight="600">LOCATION:</text>
  <text x="360" y="293" fill="#0f172a" font-family="system-ui, sans-serif" font-size="11">820 East 6th Street</text>
  <text x="260" y="318" fill="#475569" font-family="system-ui, sans-serif" font-size="11" font-weight="600">APPLICANT:</text>
  <text x="360" y="318" fill="#0f172a" font-family="system-ui, sans-serif" font-size="11">Zign LLC</text>
  <text x="260" y="343" fill="#475569" font-family="system-ui, sans-serif" font-size="11" font-weight="600">SIGN TYPE:</text>
  <text x="360" y="343" fill="#0f172a" font-family="system-ui, sans-serif" font-size="11">Projecting Blade Sign</text>
  <text x="260" y="368" fill="#475569" font-family="system-ui, sans-serif" font-size="11" font-weight="600">ISSUED:</text>
  <text x="360" y="368" fill="#0f172a" font-family="system-ui, sans-serif" font-size="11">April 1, 2026</text>
  <text x="260" y="393" fill="#475569" font-family="system-ui, sans-serif" font-size="11" font-weight="600">EXPIRES:</text>
  <text x="360" y="393" fill="#0f172a" font-family="system-ui, sans-serif" font-size="11">April 1, 2027</text>
  <!-- Divider -->
  <line x1="260" y1="410" x2="540" y2="410" stroke="#cbd5e1" stroke-width="1"/>
  <!-- Approved stamp -->
  <g transform="translate(340, 435) rotate(-12)">
    <rect x="0" y="0" width="120" height="50" rx="4" fill="none" stroke="#22c55e" stroke-width="3"/>
    <text x="60" y="22" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="20" font-weight="900">APPROVED</text>
    <text x="60" y="40" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="10">04/01/2026</text>
  </g>
  <!-- Label -->
  <rect x="280" y="555" width="240" height="32" rx="16" fill="#3b82f6" opacity="0.15"/>
  <text x="400" y="576" text-anchor="middle" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="14" font-weight="600">PERMIT · 6th Street</text>
</svg>