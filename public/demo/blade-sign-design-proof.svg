<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Blueprint grid -->
  <g opacity="0.06">
    <line x1="60" y1="0" x2="60" y2="600" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="600" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="180" y1="0" x2="180" y2="600" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="600" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="600" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="600" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="420" y1="0" x2="420" y2="600" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="600" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="540" y1="0" x2="540" y2="600" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="660" y1="0" x2="660" y2="600" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="600" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="60" x2="800" y2="60" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="800" y2="180" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="800" y2="360" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="420" x2="800" y2="420" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="800" y2="480" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="540" x2="800" y2="540" stroke="#3b82f6" stroke-width="0.5"/>
  </g>
  <!-- Title block -->
  <rect x="520" y="470" width="260" height="110" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  <text x="650" y="498" text-anchor="middle" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="12" font-weight="600" opacity="0.7">LONE STAR BREWING CO.</text>
  <text x="650" y="518" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Blade Sign - Design Proof</text>
  <line x1="530" y1="528" x2="770" y2="528" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <text x="540" y="545" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">DWG NO:</text>
  <text x="600" y="545" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">LSB-BS-001</text>
  <text x="540" y="560" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">SCALE:</text>
  <text x="600" y="560" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">1/2" = 1'-0"</text>
  <text x="540" y="575" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">REV:</text>
  <text x="600" y="575" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9">B (Final)</text>
  <!-- Wall section (side view) -->
  <rect x="100" y="80" width="30" height="400" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="115" y="50" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10" transform="rotate(-90, 115, 50)">WALL</text>
  <!-- Mounting bracket -->
  <rect x="130" y="160" width="60" height="12" fill="#334155" stroke="#475569" stroke-width="1"/>
  <rect x="130" y="320" width="60" height="12" fill="#334155" stroke="#475569" stroke-width="1"/>
  <rect x="175" y="160" width="12" height="172" fill="#334155" stroke="#475569" stroke-width="1"/>
  <!-- Blade sign (front-facing, double-sided) -->
  <rect x="200" y="100" width="280" height="360" rx="12" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <!-- Sign content -->
  <circle cx="340" cy="200" r="60" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.6"/>
  <text x="340" y="190" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="14" font-weight="700">LONE STAR</text>
  <text x="340" y="210" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="14" font-weight="700">BREWING</text>
  <!-- Hop illustration (simple) -->
  <circle cx="340" cy="300" r="20" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1"/>
  <circle cx="320" cy="290" r="12" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="0.8"/>
  <circle cx="360" cy="290" r="12" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="0.8"/>
  <text x="340" y="355" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">EST. 2024</text>
  <text x="340" y="395" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="11" font-weight="600">TAPROOM</text>
  <!-- Dimension lines -->
  <line x1="200" y1="75" x2="480" y2="75" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <line x1="200" y1="70" x2="200" y2="80" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <line x1="480" y1="70" x2="480" y2="80" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <text x="340" y="70" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="10" opacity="0.8">36"</text>
  <line x1="505" y1="100" x2="505" y2="460" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <line x1="500" y1="100" x2="510" y2="100" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <line x1="500" y1="460" x2="510" y2="460" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <text x="520" y="285" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="10" opacity="0.8" transform="rotate(90, 520, 285)">48"</text>
  <!-- Label -->
  <rect x="240" y="555" width="280" height="32" rx="16" fill="#8b5cf6" opacity="0.15"/>
  <text x="380" y="576" text-anchor="middle" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="14" font-weight="600">DRAWING · Blade Sign Proof</text>
</svg>