  <rect x="240" y="555" width="320" height="32" rx="16" fill="#8b5cf6" opacity="0.15"/>
  <text x="400" y="576" text-anchor="middle" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="14" font-weight="600">DRAWING · Wayfinding Layout</text>
