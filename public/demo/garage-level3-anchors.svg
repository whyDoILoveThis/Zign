    <circle cx="0" cy="0" r="6" fill="#334155"/>
    <line x1="-4" y1="-4" x2="4" y2="4" stroke="#22c55e" stroke-width="2"/>
    <line x1="4" y1="-4" x2="-4" y2="4" stroke="#22c55e" stroke-width="2"/>
  </g>
  <g transform="translate(550, 380)">
