<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#22c55e;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="80" y1="0" x2="80" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="560" y1="0" x2="560" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="480" x2="800" y2="480" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="560" x2="800" y2="560" stroke="#fff" stroke-width="1"/>
  </g>
  <!-- Building silhouette -->
  <rect x="150" y="200" width="500" height="250" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <rect x="180" y="230" width="80" height="100" rx="2" fill="#1e293b"/>
  <rect x="290" y="230" width="80" height="100" rx="2" fill="#1e293b"/>
  <rect x="400" y="230" width="80" height="100" rx="2" fill="#1e293b"/>
  <rect x="510" y="230" width="80" height="100" rx="2" fill="#1e293b"/>
  <!-- Illuminated channel letters -->
  <rect x="220" y="160" width="360" height="55" rx="6" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <rect x="220" y="155" width="360" height="8" rx="0" fill="url(#glow)"/>
  <text x="400" y="196" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="28" font-weight="700" letter-spacing="6">METRO MALL</text>
  <!-- Glow effect -->
  <ellipse cx="400" cy="195" rx="180" ry="40" fill="#22c55e" opacity="0.06"/>
  <!-- Check circle -->
  <g transform="translate(370, 370)">
    <circle cx="30" cy="25" r="24" fill="none" stroke="#22c55e" stroke-width="2.5"/>
    <path d="M18 25 L26 33 L42 17" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Label -->
  <rect x="280" y="490" width="240" height="36" rx="18" fill="#22c55e" opacity="0.15"/>
  <text x="400" y="514" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="15" font-weight="600">AFTER · Completed</text>
  <!-- Corner badge -->
  <rect x="24" y="24" width="100" height="32" rx="16" fill="#22c55e" opacity="0.2"/>
  <text x="74" y="45" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="13" font-weight="600">AFTER</text>
</svg>