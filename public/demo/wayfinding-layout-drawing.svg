  <rect x="550" y="120" width="150" height="110" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  <text x="625" y="180" text-anchor="middle" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="11" opacity="0.5">LAB</text>
