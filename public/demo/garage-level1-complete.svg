<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="80" y1="0" x2="80" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="560" y1="0" x2="560" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="480" x2="800" y2="480" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="560" x2="800" y2="560" stroke="#fff" stroke-width="1"/>
  </g>
  <!-- Garage structure -->
  <rect x="80" y="120" width="640" height="340" rx="2" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <!-- Ceiling beams -->
  <line x1="80" y1="160" x2="720" y2="160" stroke="#1e293b" stroke-width="8"/>
  <line x1="80" y1="200" x2="720" y2="200" stroke="#1e293b" stroke-width="3"/>
  <!-- Columns -->
  <rect x="200" y="160" width="20" height="300" fill="#1e293b"/>
  <rect x="400" y="160" width="20" height="300" fill="#1e293b"/>
  <rect x="580" y="160" width="20" height="300" fill="#1e293b"/>
  <!-- Directional signs - installed -->
  <g transform="translate(120, 230)">
    <rect x="0" y="0" width="90" height="60" rx="4" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
    <text x="45" y="25" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="11" font-weight="600">LEVEL 1</text>
    <polygon points="25,35 45,50 45,45 65,45 65,35 45,35 45,30" fill="#22c55e" opacity="0.8"/>
  </g>
  <g transform="translate(310, 230)">
    <rect x="0" y="0" width="90" height="60" rx="4" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
    <text x="45" y="25" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="11" font-weight="600">EXIT →</text>
    <polygon points="65,45 45,35 45,40 25,40 25,50 45,50 45,55" fill="#22c55e" opacity="0.8"/>
  </g>
  <g transform="translate(510, 230)">
    <rect x="0" y="0" width="90" height="60" rx="4" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
    <text x="45" y="25" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="11" font-weight="600">↑ ELEV</text>
    <polygon points="35,55 45,35 55,55" fill="#22c55e" opacity="0.8"/>
  </g>
  <!-- Floor markings -->
  <line x1="140" y1="420" x2="320" y2="420" stroke="#334155" stroke-width="2" stroke-dasharray="20,10"/>
  <line x1="440" y1="420" x2="660" y2="420" stroke="#334155" stroke-width="2" stroke-dasharray="20,10"/>
  <!-- Label -->
  <rect x="250" y="490" width="300" height="36" rx="18" fill="#22c55e" opacity="0.15"/>
  <text x="400" y="514" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="15" font-weight="600">AFTER · Garage Level 1</text>
  <!-- Corner badge -->
  <rect x="24" y="24" width="100" height="32" rx="16" fill="#22c55e" opacity="0.2"/>
  <text x="74" y="45" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="13" font-weight="600">AFTER</text>
</svg>