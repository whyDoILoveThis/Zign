  <text x="200" y="380" text-anchor="middle" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="11" opacity="0.5">WAITING</text>
  <rect x="300" y="310" width="200" height="130" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  <text x="400" y="380" text-anchor="middle" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="11" opacity="0.5">ICU</text>
